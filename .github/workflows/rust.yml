name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Prepare
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        libwebkit2gtk-4.1-dev \
        build-essential \
        libssl-dev \
        libgtk-3-dev \
        libayatana-appindicator3-dev \
        librsvg2-dev \
        libglib2.0-dev \
        pkg-config \
        libasound2-dev
    - name: Build
      run: |
        cd src-tauri
        cargo update
        cargo build --release --bin phi-tk-cli
